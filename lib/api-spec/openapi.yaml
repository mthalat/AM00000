openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: news
    description: News operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /news:
    get:
      operationId: getNews
      tags: [news]
      summary: Get news articles
      description: Fetch paginated news articles, optionally filtered by category or search query
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [all, world, politics, business, sports, technology, science, health, entertainment]
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Search query string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of news articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsResponse"

  /news/top:
    get:
      operationId: getTopNews
      tags: [news]
      summary: Get top headlines
      description: Fetch top headlines across all categories for display in hero/featured section
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: List of top news articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopNewsResponse"

  /news/categories:
    get:
      operationId: getNewsCategories
      tags: [news]
      summary: Get news category stats
      description: Returns categories with article counts
      responses:
        "200":
          description: Category statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoriesResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    NewsArticle:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        summary:
          type: string
        url:
          type: string
        imageUrl:
          type: string
          nullable: true
        source:
          type: string
        sourceUrl:
          type: string
        category:
          type: string
        publishedAt:
          type: string
        author:
          type: string
          nullable: true
      required:
        - id
        - title
        - summary
        - url
        - source
        - sourceUrl
        - category
        - publishedAt

    NewsResponse:
      type: object
      properties:
        articles:
          type: array
          items:
            $ref: "#/components/schemas/NewsArticle"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        hasMore:
          type: boolean
      required:
        - articles
        - total
        - page
        - limit
        - hasMore

    TopNewsResponse:
      type: object
      properties:
        articles:
          type: array
          items:
            $ref: "#/components/schemas/NewsArticle"
      required:
        - articles

    CategoryStat:
      type: object
      properties:
        category:
          type: string
        label:
          type: string
        count:
          type: integer
        icon:
          type: string
      required:
        - category
        - label
        - count
        - icon

    CategoriesResponse:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: "#/components/schemas/CategoryStat"
      required:
        - categories
