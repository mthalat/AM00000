services:
  - type: web
    name: smart-follow-bot
    env: node
    plan: free
    buildCommand: >
      npm install -g pnpm &&
      pnpm install &&
      BASE_PATH="/" pnpm --filter @workspace/api-spec run codegen &&
      BASE_PATH="/" pnpm --filter @workspace/follower-bot run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: smart-follow-bot-db
          property: connectionString

databases:
  - name: smart-follow-bot-db
    databaseName: smartfollowbot
    user: smartfollowbot
    plan: free
